<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Outreach Automation</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <section class="hero-card">
        <div class="hero-copy">
          <p class="eyebrow">AI-Powered Outreach</p>
          <h1>Send polished recruiter emails in seconds.</h1>
          <p>
            Create tailored outreach messages for engineering roles with a professional dark interface and instant delivery.
          </p>
        </div>
        <form id="outreach-form" novalidate>
          <div class="field-group">
            <label for="email">Recruiter Email</label>
            <input id="email" name="email" type="email" placeholder="recruiter@company.com" required />
          </div>
          <div class="field-group">
            <label for="recruiterName">Recruiter Name</label>
            <input id="recruiterName" name="recruiterName" type="text" placeholder="Taylor" />
          </div>
          <div class="field-group">
            <label for="companyName">Company Name</label>
            <input id="companyName" name="companyName" type="text" value="Paytm" placeholder="Example Labs" />
          </div>
          <div class="field-group">
            <label for="resume">Resume (PDF)</label>
            <input id="resume" name="resume" type="file" accept="application/pdf,.pdf" />
          </div>
          <div class="field-group">
            <label for="role">Role</label>
            <select id="role" name="role" required>
              <option value="">Select a role</option>
              <option>Full Stack Developer</option>
              <option>Frontend Engineer</option>
              <option>Backend Engineer</option>
              <option>Software Engineer</option>
            </select>
          </div>
          <div class="actions">
            <button type="button" id="preview-btn" class="secondary-btn">Preview Email</button>
            <button type="submit" id="submit-btn" class="primary-btn">Send Email</button>
          </div>
        </form>
      </section>

      <section class="preview-card">
        <h2>Email Preview</h2>
        <div id="preview-content" class="preview-content">
          <p>Select your details to preview a tailored email.</p>
        </div>
      </section>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <div id="spinner" class="spinner hidden" aria-hidden="true"></div>

    <script src="script.js"></script>
  </body>
</html>
